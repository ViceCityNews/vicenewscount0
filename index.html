<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GTA VI Countdown</title>
    <meta name="description"
        content="Countdown to the release of Grand Theft Auto VI. Follow the remaining time, watch trailers, view screenshots, and stay updated with the latest GTA VI news.">
    <meta name="keywords" content="GTA VI, GTA 6, Grand Theft Auto VI, Rockstar Games, Countdown, Trailers, News">
    <meta name="author" content="Lucas">

    <meta name="theme-color" content="#ff5f95">

    <link rel="icon" href="https://vicecity.news/src/imgs/logo.png">
    <link rel="apple-touch-icon" href="https://vicecity.news/src/imgs/logo.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="GTA VI Countdown">
    <meta property="og:description" content="Countdown to the biggest release in gaming history.">
    <meta property="og:image" content="https://vicecity.news/src/imgs/backgound.jpg">
    <meta property="og:url" content="https://vicecity.news">
    <meta property="og:site_name" content="GTA VI Countdown">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GTA VI Countdown">
    <meta name="twitter:description" content="Countdown to the biggest release in gaming history.">
    <meta name="twitter:image" content="https://vicecity.news/src/imgs/backgound.jpg">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen text-white">

    <div class="background"></div>
    <div class="overlay"></div>

    <main class="relative min-h-screen px-6 py-10">

        <section class="content-box w-full max-w-5xl mx-auto text-center mt-32">


            <img src="/src/imgs/logo.svg" alt="GTA VI Logo" class="w-56 md:w-72 mx-auto mt-5 mb-6 select-none">

            <p class="uppercase tracking-[10px] text-pink-300 text-sm font-semibold">
                Rockstar Games
            </p>

            <p class="mt-5 text-zinc-300 text-lg max-w-2xl mx-auto">
                Counting down to the biggest release in gaming history.
            </p>

            <div id="timer" class="mt-14 flex flex-wrap justify-center gap-5">

                <div class="card">
                    <div id="days" class="number">
                        0
                    </div>
                    <div class="label">
                        Days
                    </div>
                </div>

                <div class="card">
                    <div id="hours" class="number">
                        00
                    </div>
                    <div class="label">
                        Hours
                    </div>
                </div>

                <div class="card">
                    <div id="minutes" class="number">
                        00
                    </div>
                    <div class="label">
                        Minutes
                    </div>
                </div>

                <div class="card">
                    <div id="seconds" class="number">
                        00
                    </div>
                    <div class="label">
                        Seconds
                    </div>
                </div>

            </div>

            <div class="mt-12 flex justify-center">
                <div class="h-px w-72 bg-gradient-to-r from-transparent via-pink-500 to-transparent opacity-80"></div>
            </div>

            <p class="release-date mt-8 text-xs uppercase">
                November 19, 2026
            </p>

            <div class="mt-10 flex flex-col items-center gap-4">
    <p class="text-sm uppercase tracking-[6px] text-pink-300 font-semibold">
        Preorder Now
    </p>

    <div class="mt-10 flex flex-col items-center gap-4">
    <p class="text-sm uppercase tracking-[6px] text-pink-300 font-semibold">
        Preorder Now
    </p>

    <div class="flex flex-wrap justify-center gap-6">
        <a href="https://www.playstation.com/games/grand-theft-auto-vi/"
            target="_blank"
            class="flex items-center justify-center w-40 h-14 border border-white/30 rounded-xl bg-white/5 hover:bg-white/10 transition duration-300">

            <img src="src/imgs/ps5.svg" alt="PlayStation 5" class="h-7">
        </a>

        <a href="https://www.xbox.com/games/grand-theft-auto-vi"
            target="_blank"
            class="flex items-center justify-center w-40 h-14 border border-white/30 rounded-xl bg-white/5 hover:bg-white/10 transition duration-300">

            <img src="src/imgs/xbox.svg" alt="Xbox" class="h-7">
        </a>
    </div>
</div>
</div>

        </section>

        <section class="w-full max-w-5xl mx-auto mt-20">

            <h2 class="text-4xl font-bold text-center text-pink-400 mb-10">
                Trailers
            </h2>

            <div class="space-y-8">

                <section class="rounded-3xl border border-white/10 bg-black/30 p-6 backdrop-blur-xl">
                    <h3 class="mb-5 text-2xl font-bold text-pink-400">
                        Trailer 1
                    </h3>

                    <div class="overflow-hidden rounded-2xl aspect-video">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/QdBZY2fkU-0"
                            title="GTA VI Trailer 1" allowfullscreen>
                        </iframe>
                    </div>
                </section>

                <section class="rounded-3xl border border-white/10 bg-black/30 p-6 backdrop-blur-xl">
                    <h3 class="mb-5 text-2xl font-bold text-orange-400">
                        Trailer 2
                    </h3>

                    <div class="overflow-hidden rounded-2xl aspect-video">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/VQRLujxTm3c"
                            title="GTA VI Trailer 2" allowfullscreen>
                        </iframe>
                    </div>
                </section>

                <section class="rounded-3xl border border-white/10 bg-black/30 p-6 backdrop-blur-xl">
                    <h3 class="mb-5 text-2xl font-bold text-cyan-400">
                        Official Cover Art Reveal
                    </h3>

                    <div class="overflow-hidden rounded-2xl aspect-video">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/EiQEBYDox_k"
                            title="Official Cover Art Reveal" allowfullscreen>
                        </iframe>
                    </div>
                </section>

            </div>

        </section>


    </main>

    <script src="script.js"></script>

</body>

</html>
