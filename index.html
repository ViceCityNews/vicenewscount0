<script>
const targetDate = new Date('2026-11-19T12:00:00-05:00');

const translations = {
  en: {
    subtitle: 'Countdown to Launch',
    days: 'Days',
    hours: 'Hours',
    minutes: 'Minutes',
    seconds: 'Seconds',
    launchTitle: '🚀 NOW AVAILABLE',
    launchText: 'GTA VI has officially launched.'
  },

  pt: {
    subtitle: 'Contagem Regressiva para o Lançamento',
    days: 'Dias',
    hours: 'Horas',
    minutes: 'Minutos',
    seconds: 'Segundos',
    launchTitle: '🚀 LANÇOU',
    launchText: 'GTA VI já está disponível.'
  },

  es: {
    subtitle: 'Cuenta Regresiva para el Lanzamiento',
    days: 'Días',
    hours: 'Horas',
    minutes: 'Minutos',
    seconds: 'Segundos',
    launchTitle: '🚀 YA DISPONIBLE',
    launchText: 'GTA VI ya ha sido lanzado.'
  }
};

let currentLanguage = 'en';

function applyLanguage(lang) {
  currentLanguage = lang;

  document.documentElement.lang = lang;

  document.getElementById('subtitle').textContent =
    translations[lang].subtitle;

  document.getElementById('daysLabel').textContent =
    translations[lang].days;

  document.getElementById('hoursLabel').textContent =
    translations[lang].hours;

  document.getElementById('minutesLabel').textContent =
    translations[lang].minutes;

  document.getElementById('secondsLabel').textContent =
    translations[lang].seconds;

  localStorage.setItem('language', lang);
}

function updateCountdown() {

  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {

    document.getElementById('timer').innerHTML = `
      <div class="text-center">
        <h2 class="text-6xl md:text-8xl font-black bg-gradient-to-r from-pink-300 via-orange-200 to-purple-300 bg-clip-text text-transparent">
          ${translations[currentLanguage].launchTitle}
        </h2>

        <p class="text-white text-xl mt-4">
          ${translations[currentLanguage].launchText}
        </p>
      </div>
    `;

    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById('days').textContent = days;
  document.getElementById('hours').textContent = hours;
  document.getElementById('minutes').textContent = minutes;
  document.getElementById('seconds').textContent = seconds;
}

document
.getElementById('languageSelector')
.addEventListener('change', function(e) {
  applyLanguage(e.target.value);
});

const savedLanguage =
localStorage.getItem('language') || 'en';

document.getElementById('languageSelector').value =
savedLanguage;

applyLanguage(savedLanguage);

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
