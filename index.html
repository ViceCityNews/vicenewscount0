    <h1 class="title">GTA VI</h1>

    <p class="subtitle">Countdown to Launch</p>

        <div id="hours" class="number purple neon">0</div>
        <div class="label">Hours</div>
      </div>

      <div class="timer-card border-orange">
        <div id="minutes" class="number orange neon">0</div>
        <div class="label">Minutes</div>
      </div>

      <div class="timer-card border-cyan">
        <div id="seconds" class="number cyan neon">0</div>
        <div class="label">Seconds</div>
      </div>

    </div>

    <div class="socials">
