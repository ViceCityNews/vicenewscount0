<body>

  <div class="background-image"></div>
  <div class="background-overlay"></div>

  <div class="orb pink floating"></div>
  <div class="orb orange floating"></div>

  <main class="container">

      <div class="logo">
    <svg viewBox="0 0 46 35" xmlns="http://www.w3.org/2000/svg">
      <path d="M46.2661 0.800781H34.7236V34.4008H46.2661V0.800781Z" fill="currentColor"/>
      <path d="M33.9162 0.800781L17.3358 34.4008L0.776855 0.800781H12.3139L17.3332 11.5445L22.3766 0.800781H33.9162Z" fill="currentColor"/>
    </svg>
  </div>

    <p class="subtitle">Countdown to Launch</p>

    <div id="timer" class="timer">

      <div class="timer-card border-pink">
        <div id="days" class="number pink neon">0</div>
        <div class="label">Days</div>
      </div>

      <div class="timer-card border-purple">
        <div id="hours" class="number purple neon">0</div>
        <div class="label">Hours</div>
      </div>

      <div class="timer-card border-orange">
        <div id="minutes" class="number orange neon">0</div>
        <div class="label">Minutes</div>
      </div>

      <div class="timer-card border-cyan">
        <div id="seconds" class="number cyan neon">0</div>
        <div class="label">Seconds</div>
      </div>

    </div>

<div class="socials">
  <a href="#" class="social youtube" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor">

    <span>YouTube</span>
  </a>

  <a href="#" class="social twitter" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor">

    </svg>
    <span>X</span>
  </a>

  <a href="#" class="social instagram" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor">
