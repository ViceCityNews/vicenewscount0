<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GTA VI Countdown</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes float {
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-25px)}
        }

        @keyframes glow{
            0%,100%{
                box-shadow:0 0 15px rgba(255,46,166,.35);
            }
            50%{
                box-shadow:0 0 40px rgba(255,140,66,.65);
            }
        }

        .float{
            animation:float 8s ease-in-out infinite;
        }

        .glow{
            animation:glow 3s ease-in-out infinite;
        }

        .neon{
            text-shadow:
            0 0 10px currentColor,
            0 0 20px currentColor,
            0 0 40px currentColor;
        }
    </style>
</head>

<body class="overflow-hidden bg-black text-white">

    <!-- Background -->
    <div
        class="fixed inset-0 -z-30 scale-110 bg-cover bg-center blur-md brightness-50"
        style="background-image:url('https://www.rockstargames.com/VI/_next/static/media/Vice_City_01.135x56yoeu.6t.jpg')">
    </div>

    <div class="fixed inset-0 -z-20 bg-gradient-to-br from-pink-500/10 via-purple-600/10 to-black/90"></div>

    <div class="fixed inset-0 -z-10 bg-black/40"></div>

    <!-- Orbs -->
    <div class="float absolute left-0 top-0 h-[420px] w-[420px] rounded-full bg-pink-500 opacity-20 blur-[90px]"></div>

    <div class="float absolute bottom-0 right-0 h-[420px] w-[420px] rounded-full bg-orange-500 opacity-20 blur-[90px]"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 z-50 w-full border-b border-white/10 bg-black/40 backdrop-blur-xl">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-8">

            <a href="/" class="text-2xl transition hover:scale-110 hover:text-pink-500">
                🏠
            </a>

            <div class="flex items-center gap-8 font-semibold uppercase tracking-widest">
                <a href="/trailers" class="transition hover:text-pink-400">
                    Trailers
                </a>

                <a href="/images" class="transition hover:text-orange-400">
                    Images
                </a>
            </div>

        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="relative z-10 flex min-h-screen flex-col items-center justify-center px-5 pt-20">

        <h1 class="mb-4 text-7xl font-black tracking-[8px] neon text-white">
            GTA VI
        </h1>

        <p class="mb-14 text-lg text-white/80">
            Countdown until launch
        </p>

        <!-- Timer -->
        <div id="timer" class="flex flex-wrap justify-center gap-6">

            <div class="glow min-w-[130px] rounded-3xl border border-pink-500 bg-black/30 p-6 text-center backdrop-blur-xl transition hover:-translate-y-2 hover:scale-105">
                <div id="days" class="neon text-5xl font-black text-pink-500">
                    0
                </div>
                <p class="mt-3 uppercase tracking-widest text-white/80">
                    Days
                </p>
            </div>

            <div class="glow min-w-[130px] rounded-3xl border border-purple-500 bg-black/30 p-6 text-center backdrop-blur-xl transition hover:-translate-y-2 hover:scale-105">
                <div id="hours" class="neon text-5xl font-black text-purple-500">
                    0
                </div>
                <p class="mt-3 uppercase tracking-widest text-white/80">
                    Hours
                </p>
            </div>

            <div class="glow min-w-[130px] rounded-3xl border border-orange-500 bg-black/30 p-6 text-center backdrop-blur-xl transition hover:-translate-y-2 hover:scale-105">
                <div id="minutes" class="neon text-5xl font-black text-orange-400">
                    0
                </div>
                <p class="mt-3 uppercase tracking-widest text-white/80">
                    Minutes
                </p>
            </div>

            <div class="glow min-w-[130px] rounded-3xl border border-cyan-400 bg-black/30 p-6 text-center backdrop-blur-xl transition hover:-translate-y-2 hover:scale-105">
                <div id="seconds" class="neon text-5xl font-black text-cyan-400">
                    0
                </div>
                <p class="mt-3 uppercase tracking-widest text-white/80">
                    Seconds
                </p>
            </div>

        </div>

        <!-- Socials -->
        <div class="mt-14 flex flex-wrap justify-center gap-5">

            <a href="https://www.youtube.com/@ViceCityNewss"
                target="_blank"
                class="rounded-2xl border border-white/10 bg-black/30 p-4 backdrop-blur-xl transition hover:-translate-y-1 hover:scale-110 hover:border-red-500 hover:text-red-500 hover:shadow-[0_0_25px_rgba(255,0,0,.7)]">

                Youtube

            </a>

            <a href="https://x.com/vicecitynews_"
                target="_blank"
                class="rounded-2xl border border-white/10 bg-black/30 p-4 backdrop-blur-xl transition hover:-translate-y-1 hover:scale-110 hover:border-white hover:shadow-[0_0_25px_rgba(255,255,255,.7)]">

                X

            </a>

            <a href="https://www.instagram.com/vicecitynews_/"
                target="_blank"
                class="rounded-2xl border border-white/10 bg-black/30 p-4 backdrop-blur-xl transition hover:-translate-y-1 hover:scale-110 hover:border-pink-500 hover:text-pink-500 hover:shadow-[0_0_25px_rgba(255,46,166,.7)]">

                Instagram

            </a>

            <a href="#"
                class="rounded-2xl border border-white/10 bg-black/30 p-4 backdrop-blur-xl transition hover:-translate-y-1 hover:scale-110 hover:border-cyan-400 hover:text-cyan-400 hover:shadow-[0_0_25px_rgba(34,211,238,.7)]">

                TikTok

            </a>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
