<script>
const targetDate = new Date('2026-11-19T12:00:00-05:00');

function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById('timer').innerHTML = `
      <div class="text-center">
        <h2 class="text-6xl md:text-8xl font-black bg-gradient-to-r from-pink-300 via-orange-200 to-purple-300 bg-clip-text text-transparent">
          🚀 NOW AVAILABLE
        </h2>
        <p class="text-white text-xl mt-4">
          GTA VI has officially launched.
        </p>
      </div>
    `;
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById('days').textContent = days;
  document.getElementById('hours').textContent = hours;
  document.getElementById('minutes').textContent = minutes;
  document.getElementById('seconds').textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
